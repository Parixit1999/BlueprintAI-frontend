server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: client-side routes (/projects, /files, ...) load the app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # static assets get long-lived caching (filenames are content-hashed)
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
